name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Foundry Tests
    runs-on: ubuntu-latest

    env:
      # Dummy values so deploy/interaction scripts compile in CI
      # These are NEVER used for real transactions — CI only runs `forge test`
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      SAFE_OWNER_ADDRESS: "0x0000000000000000000000000000000000000001"
      BASE_RPC_URL: "https://mainnet.base.org"
      SEPOLIA_RPC_URL: "https://ethereum-sepolia-rpc.publicnode.com"
      ETHERSCAN_API_KEY: "dummy"
      BASESCAN_API_KEY: "dummy"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Foundry version
        run: forge --version

      - name: Run Forge build
        run: forge build
        id: build

      - name: Run Forge tests
        run: forge test -vv
        id: test
          
